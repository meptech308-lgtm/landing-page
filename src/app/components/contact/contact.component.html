<div>
  <app-banner></app-banner>
</div>

<div class="container-fluid">
  <div class="contact-form-container">
    <h2>Request a Quote</h2>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <!-- Full Name + Phone -->
      <div class="row">
        <div class="form-group col">
          <label>Full Name</label>
          <input class="form-control" type="text" formControlName="fullName" placeholder="Enter your full name"/>
        </div>

        <div class="form-group col">
          <label>Phone</label>
          <input class="form-control" type="tel" formControlName="phone" placeholder="Enter your phone number"/>
        </div>
      </div>

      <!-- Email + Product Type -->
      <div class="row">
        <div class="form-group col">
          <label>Email</label>
          <input class="form-control" type="email" formControlName="email" placeholder="Enter your email"/>
        </div>

        <div class="form-group col">
          <label>Product Type</label>
          <select class="form-control" formControlName="productType">
            <option value="">Select Product Type</option>
            <option *ngFor="let type of productTypes" [value]="type">
              {{ type }}
            </option>
          </select>
        </div>
      </div>

      <!-- Product Name + Company -->
      <div class="row">
        <div class="form-group col">
          <label>Product Name</label>
          <input
            class="form-control"
            type="text"
            formControlName="productName"
            placeholder="e.g. VRV X"
          />
        </div>

        <div class="form-group col">
          <label>Company Name</label>
          <input class="form-control" type="text" formControlName="company" placeholder="Enter your company name"/>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-submit">Request a Quote</button>
    </form>
  </div>

  <!-- Side Card -->
  <div class="card">
    <h5>Business Hours</h5>
    <p>Mon-Fri: 8:30 AM - 6:00 PM</p>
    <p>Sat-Sun: Closed</p>

    <h5>Location</h5>
    <p>
      Office no 47 M Floor, Land Rover Showroom building, Manazel Tower, Al
      Garhoud, Dubai
    </p>

    <button (click)="openMap()" class="btn-submit">View on Map</button>
  </div>
</div>
